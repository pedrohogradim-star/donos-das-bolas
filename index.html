// Retorna o estado de tempo de uma rodada
function getRoundTimeStatus(rid) {
  const now = new Date();
  const sched = ROUND_SCHEDULE[rid];
  if (!sched) return { open: true, label: '' };
  if (now < sched.closeAt) {
    // Aberta — mosrtrar countdown para fechamento
    const diff = sched.closeAt - now;
    return { open: true, countdown: diff, label: 'palpites fecham em', urgent: diff < 3600000 };

  return { open: true, label: '' }; // reabriu para próxima rodada (não se aplica aqui)

function fmtCountdown(ms) {
  if (ms <= 0) return '00:00:00';
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  const pad = v => String(v).padStart(2,'0');
  if (h > 0) return `${pad(h)}:${pad(m)}:${pad(sec)}`;

}

const DB_KEY="bolao_donos_v1";

// Estado: votes, results, closed, unlocked, submitted (palpites enviados), drafts (rascunhos)

// ── Auth ──────────────────────────────────────────────────────────────────────
function isAdmin(){return adminUser!==null;}
function showLoginModal(cb){
  window._loginCb=cb||null;
  document.getElementById('login-modal').style.display='flex';
  document.getElementById('login-err').style.display='none';
  document.getElementById('login-pass').value='';
}
function closeLoginModal(){document.getElementById('login-modal').style.display='none';}
function doLogin(){
  const u=document.getElementById('login-user').value;

}

// ── Firebase ──────────────────────────────────────────────────────────────────
async function loadState(){
  try{
    const res=await fetch(`${FIREBASE_URL}/${DB_KEY}.json`);
    if(res.ok){
      const d=await res.json();
      if(d) state=Object.assign({votes:{},results:{},closed:{r1:false,r2:false,r3:false},unlocked:{r1:true,r2:false,r3:false},submitted:{}},d);
    }
  }catch(e){console.warn('Firebase indisponível',e);}
  loaded=true;
  // Auto-marcar como enviado quem já tem todos os jogos votados
  if(!state.submitted)state.submitted={};
  let autoSaved=false;
  ROUNDS.forEach(r=>{
    const votes=state.votes[r.id]||{};
    PARTICIPANTS.forEach(p=>{
      const pv=votes[p]||{};
      const done=r.games.filter(g=>pv[g.id]).length;
      if(done===r.games.length){
        if(!state.submitted[p])state.submitted[p]={};
        if(!state.submitted[p][r.id]){state.submitted[p][r.id]=true;autoSaved=true;}
      }
    });
  });
  if(autoSaved)save();
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  renderCurrent();
  startCountdownTick();
}
let saveTimer=null;
async function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await fetch(`${FIREBASE_URL}/${DB_KEY}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
      const t=document.getElementById('saving-toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);
    }catch(e){console.warn('Erro ao salvar',e);}
  },500);
}

// ── Countdown tick ────────────────────────────────────────────────────────────
let tickInterval=null;
function startCountdownTick(){
  if(tickInterval)clearInterval(tickInterval);
  tickInterval=setInterval(()=>{
    // Atualiza só o timer sem re-renderizar tudo
    const el=document.getElementById('countdown-timer-val');
    const ridEl=document.getElementById('countdown-timer-rid');
    if(!el||!ridEl)return;
    const rid=ridEl.value;
    const ts=getRoundTimeStatus(rid);
    if(ts.countdown!=null){
      el.textContent=fmtCountdown(ts.countdown);
      const box=document.getElementById('countdown-box');
      if(box&&ts.urgent)box.classList.add('urgent');
    }
  },1000);
}

let draft={}; // {pid: {rid: {gid: val}}}

function renderCurrent(){
  if(currentTab==='palpites')renderPalpites();
  else if(currentTab==='resultados')renderResultados();
  else if(currentTab==='rank')renderRank();

  currentTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['palpites','resultados','rank','recordes'][i]===t));

// ── Helpers de palpites ───────────────────────────────────────────────────────
function isSubmitted(p,rid){
  return !!(state.submitted&&state.submitted[p]&&state.submitted[p][rid]);
}
function getDraft(p,rid){
  if(!draft[p])draft[p]={};
  if(!draft[p][rid]){
    // inicializa com palpites já enviados, se houver
    const saved=(state.votes[rid]&&state.votes[rid][p])||{};
    draft[p][rid]=Object.assign({},saved);
  }
  return draft[p][rid];
}

// ── Palpites ─ lista ──────────────────────────────────────────────────────────
function renderPalpites(){
  const c=document.getElementById('tab-palpites');
  if(!loaded){c.innerHTML='<div class="empty">Carregando...</div>';return;}
  if(showingPList||!activeP){renderPList(c);}
  else{renderPalpiteForm(c);}
}

function renderPList(c){
  const scored=computeScores();
  // Rodada aberta atual
  const activeRound=ROUNDS.find(r=>state.unlocked[r.id]&&!state.closed[r.id])||ROUNDS[0];
  const rid=activeRound.id;

  let html=`<div class="participant-modal"><div class="plist-header">⚽ Selecione seu nome</div>`;
  PARTICIPANTS.forEach(p=>{
    const esc=p.replace(/'/g,"\\'");
    const submitted=isSubmitted(p,rid);
    const pvSaved=(state.votes[rid]&&state.votes[rid][p])||{};
    const doneCount=Object.values(pvSaved).filter(Boolean).length;
    const total=activeRound.games.length;
    const pts=scored[p]?scored[p].total:0;
    const cv=canVote(rid);

    let badge='';
    if(state.closed[rid]){
      badge=`<span class="status-badge sb-locked">encerrada</span>`;
    } else if(!cv){
      badge=`<span class="status-badge sb-locked">⏰ fechado</span>`;
    } else if(submitted){
      badge=`<span class="status-badge sb-done">✓ enviado</span>`;
    } else if(doneCount>0){
      badge=`<span class="status-badge sb-edit">rascunho ${doneCount}/${total}</span>`;
    } else {
      badge=`<span class="status-badge sb-pending">pendente</span>`;
    }

    html+=`<div class="pitem" onclick="selectP('${esc}')">
      <span style="font-size:15px;font-weight:600;letter-spacing:1px">${p}</span>
      <span style="display:flex;align-items:center;gap:8px">
        ${badge}
        ${pts>0?`<span class="pts">${pts}pts</span>`:''}
      </span>
    </div>`;
  });
  html+=`</div>`;
  c.innerHTML=html;
}

function selectP(p){
  activeP=p;showingPList=false;
  const open=ROUNDS.find(r=>state.unlocked[r.id]&&!state.closed[r.id]);
  activePTab=open?open.id:(ROUNDS.find(r=>state.unlocked[r.id])||ROUNDS[0]).id;
  renderPalpites();
}

// ── Palpites ─ formulário ─────────────────────────────────────────────────────
function renderPalpiteForm(c){
  const r=ROUNDS.find(x=>x.id===activePTab)||ROUNDS[0];
  const rid=r.id;
  const cv=canVote(rid);
  const submitted=isSubmitted(activeP,rid);
  const roundClosed=state.closed[rid];
  const isEditable = cv && !submitted && !roundClosed;
  const isViewOnly = roundClosed || (!cv && submitted) || (!cv && !submitted);

  // Se está editando (enviado mas ainda aberto): usa rascunho a partir do enviado
  const pv = isEditable ? getDraft(activeP,rid) : ((state.votes[rid]&&state.votes[rid][activeP])||{});

  const done=r.games.filter(g=>pv[g.id]).length;
  const total=r.games.length;
  const allDone=done===total;

  const ts=getRoundTimeStatus(rid);

  let html=`<button class="back-btn" onclick="goBack()">← Voltar</button>`;
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div class="pname-display">${activeP}</div>
    <span class="pill ${allDone?'pill-ok':'pill-no'}">${done}/${total}</span>
  </div>`;

  // Abas de rodada
  const roundBtns=ROUNDS.map(r2=>{
    const ul=state.unlocked[r2.id];
    return `<button class="rtab${activePTab===r2.id?' active':''}" onclick="selectPTab('${r2.id}')" ${!ul?'disabled':''}>${r2.name}</button>`;
  }).join('');
  html+=`<div class="round-tab-row">${roundBtns}</div>`;

  // Countdown
  if(!roundClosed && ts.countdown!=null){
    html+=`<div class="countdown-box${ts.urgent?' urgent':''}" id="countdown-box">
      <input type="hidden" id="countdown-timer-rid" value="${rid}">
      <div class="countdown-label">⏰ ${ts.label}</div>
      <div class="countdown-timer" id="countdown-timer-val">${fmtCountdown(ts.countdown)}</div>
      <div class="countdown-sub">Após esse horário os palpites serão bloqueados automaticamente</div>
    </div>`;
  }

  // Status notices
  if(roundClosed){
    html+=`<div class="notice notice-warn">🔒 Rodada encerrada — apenas consulta.</div>`;
  } else if(!cv){
    html+=`<div class="notice notice-err">⏰ Palpites fechados para esta rodada.</div>`;
  } else if(submitted){
    html+=`<div class="notice notice-ok">✅ Palpite enviado! Você pode editar até 30 min antes do 1º jogo.</div>`;
  }

  // Jogos
  r.games.forEach(g=>{
    const sel=pv[g.id]||'';
    const resVal=state.results[rid]&&state.results[rid][g.id];
    const dis = isViewOnly ? 'disabled' : '';

    const bc=(v)=>{
      const base=v==='draw'?'vote-draw':'vote-btn';
      if((roundClosed||!cv)&&resVal){
        if(sel===v&&v===resVal)return base+' correct';
        if(sel===v&&v!==resVal)return base+' wrong';
        if(v===resVal)return base+' sel';
        return base;
      }
      return base+(sel===v?' sel':'');
    };

    html+=`<div class="game-block">
      <div class="game-meta">${g.time} · Grupo ${g.group}</div>
      <div class="vote-row">
        <button class="${bc('home')}" ${dis} onclick="setDraft('${rid}','${g.id}','home')">
          <span class="fl">${F(g.home)}</span><span class="tn">${g.home}</span>
        </button>
        <button class="${bc('draw')}" ${dis} onclick="setDraft('${rid}','${g.id}','draw')">EMP</button>
        <button class="${bc('away')}" ${dis} onclick="setDraft('${rid}','${g.id}','away')">
          <span class="fl">${F(g.away)}</span><span class="tn">${g.away}</span>
        </button>
      </div>
    </div>`;
  });

  // Botão enviar / editar
  if(!roundClosed && cv){
    if(!submitted){
      html+=`<button class="btn-gold" ${!allDone?'disabled':''} onclick="submitPalpite('${rid}')">
        ${allDone?'✅ Enviar Palpite':'⚽ Preencha todos os jogos para enviar'}
      </button>`;
      if(!allDone)html+=`<p style="font-size:11px;color:#555;text-align:center;margin-top:8px">${done} de ${total} jogos preenchidos</p>`;
    } else {
      html+=`<button class="btn-outline" onclick="editPalpite('${rid}')">✏️ Editar Palpite</button>`;
    }
  }

  c.innerHTML=html;
  startCountdownTick();
}

function goBack(){showingPList=true;activeP=null;renderPalpites();}
function selectPTab(rid){activePTab=rid;renderPalpites();}

function setDraft(rid,gid,val){
  if(!canVote(rid)||isSubmitted(activeP,rid)||state.closed[rid])return;
  const d=getDraft(activeP,rid);
  d[gid]=val;
  renderPalpites();
}

function submitPalpite(rid){
  const d=getDraft(activeP,rid);
  const r=ROUNDS.find(x=>x.id===rid);
  if(r.games.some(g=>!d[g.id]))return;
  if(!state.votes[rid])state.votes[rid]={};
  state.votes[rid][activeP]=Object.assign({},d);
  if(!state.submitted)state.submitted={};
  if(!state.submitted[activeP])state.submitted[activeP]={};
  state.submitted[activeP][rid]=true;
  save();
  renderPalpites();
}

function editPalpite(rid){
  if(!canVote(rid))return;
  // Reativa edição: desmarca enviado e copia palpite salvo para rascunho
  if(!state.submitted[activeP])return;
  delete state.submitted[activeP][rid];
  // rascunho já tem os dados, só re-renderiza
  renderPalpites();
}

      </div>

}
function selResTab(rid){activeResTab=rid;renderResultados();}

function renderResBodyView(){
  const c=document.getElementById('res-body');if(!c)return;
  const r=ROUNDS.find(x=>x.id===activeResTab);
  const rr=(state.results[r.id])||{};
  let html='';
  if(!Object.keys(rr).length){html=`<div class="empty">Nenhum resultado lançado ainda.</div>`;c.innerHTML=html;return;}
  r.games.forEach(g=>{
    const sel=rr[g.id]||'';
    if(!sel)return;
    html+=`<div class="game-block">
      <div class="game-meta">${g.time} · Grupo ${g.group}</div>
      <div style="font-size:13px;font-weight:600;color:#eee;margin-bottom:8px">${F(g.home)} ${g.home} vs ${g.away} ${F(g.away)}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="result-btn${sel==='home'?' sel':''}" disabled>${F(g.home)} ${g.home}</button>
        <button class="result-btn${sel==='draw'?' sel':''}" disabled>Empate</button>
        <button class="result-btn${sel==='away'?' sel':''}" disabled>${F(g.away)} ${g.away}</button>
      </div>
    </div>`;
  });
  c.innerHTML=html||`<div class="empty">Nenhum resultado lançado ainda.</div>`;
}

function renderResBody(){
  const c=document.getElementById('res-body');if(!c)return;
  const r=ROUNDS.find(x=>x.id===activeResTab);
  if(!state.results[r.id])state.results[r.id]={};
  const rr=state.results[r.id];
  const locked=state.closed[r.id];
  let html='';
  if(locked)html+=`<div class="notice notice-ok">✅ Rodada encerrada — você ainda pode corrigir resultados individuais.</div>`;
  r.games.forEach(g=>{
    const sel=rr[g.id]||'';
    html+=`<div class="game-block">
      <div class="game-meta">${g.time} · Grupo ${g.group}</div>
      <div style="font-size:13px;font-weight:600;color:#eee;margin-bottom:8px">${F(g.home)} ${g.home} vs ${g.away} ${F(g.away)}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="result-btn${sel==='home'?' sel':''}" onclick="setResult('${r.id}','${g.id}','home')">${F(g.home)} ${g.home}</button>
        <button class="result-btn${sel==='draw'?' sel':''}" onclick="setResult('${r.id}','${g.id}','draw')">Empate</button>
        <button class="result-btn${sel==='away'?' sel':''}" onclick="setResult('${r.id}','${g.id}','away')">${F(g.away)} ${g.away}</button>
      </div>
    </div>`;
  });
  const allFilled=r.games.every(g=>rr[g.id]);
  if(!locked){
    html+=`<button class="btn-green" ${!allFilled?'disabled':''} onclick="closeRound('${r.id}')">▶ Encerrar ${r.name} e gerar pontuação</button>`;
    if(!allFilled)html+=`<p style="font-size:11px;color:#555;text-align:center;margin-top:6px">Preencha todos os resultados para encerrar.</p>`;
  }
  c.innerHTML=html;
}
function setResult(rid,gid,val){
  if(!state.results[rid])state.results[rid]={};
  state.results[rid][gid]=state.results[rid][gid]===val?undefined:val;
  if(state.results[rid][gid]===undefined)delete state.results[rid][gid];
  save();renderResBody();
}
function closeRound(rid){
  state.closed[rid]=true;
  const idx=ROUNDS.findIndex(r=>r.id===rid);
  if(idx+1<ROUNDS.length)state.unlocked[ROUNDS[idx+1].id]=true;
  save();renderResultados();showTab('rank');
}

// ── Scores ────────────────────────────────────────────────────────────────────
function computeScores(){
  const sc={};
  PARTICIPANTS.forEach(p=>sc[p]={total:0,byRound:{}});
  ROUNDS.forEach(r=>{
    const res=state.results[r.id]||{};
    const votes=state.votes[r.id]||{};
    PARTICIPANTS.forEach(p=>{
      const pv=votes[p]||{};let pts=0;
      r.games.forEach(g=>{if(res[g.id]&&pv[g.id]===res[g.id])pts++;});
      sc[p].byRound[r.id]=pts;sc[p].total+=pts;
    });
  });
  return sc;
}

// ── Ranking ───────────────────────────────────────────────────────────────────
function renderRank(){
  const c=document.getElementById('tab-rank');
  if(!loaded){c.innerHTML='<div class="empty">Carregando...</div>';return;}
  const scores=computeScores();
  const closedRounds=ROUNDS.filter(r=>state.closed[r.id]);
  const tabBtns=[`<button class="rtab${activeRankTab==='all'?' active':''}" onclick="selRankTab('all')">Geral</button>`]
    .concat(closedRounds.map(r=>`<button class="rtab${activeRankTab===r.id?' active':''}" onclick="selRankTab('${r.id}')">${r.name}</button>`))
    .join('');
  const sorted=PARTICIPANTS.map(p=>({name:p,pts:activeRankTab==='all'?scores[p].total:(scores[p].byRound[activeRankTab]||0)})).sort((a,b)=>b.pts-a.pts);
  const totalGames=activeRankTab==='all'?closedRounds.reduce((s,r)=>s+r.games.length,0):(ROUNDS.find(r=>r.id===activeRankTab)||{games:[]}).games.length;
  const topPts=sorted[0]?sorted[0].pts:0;
  const avg=sorted.length?Math.round(sorted.reduce((s,p)=>s+p.pts,0)/sorted.length):0;
  let html=`<div class="round-tab-row">${tabBtns}</div>`;
  if(!closedRounds.length){html+=`<div class="empty">🏆<br><br>Nenhuma rodada encerrada ainda.</div>`;c.innerHTML=html;return;}
  html+=`<div class="summary-bar">
    <div class="smet"><div class="smet-val">${sorted.length}</div><div class="smet-lbl">participantes</div></div>
    <div class="smet"><div class="smet-val">${totalGames}</div><div class="smet-lbl">jogos</div></div>
    <div class="smet"><div class="smet-val">${topPts}</div><div class="smet-lbl">top</div></div>
    <div class="smet"><div class="smet-val">${avg}</div><div class="smet-lbl">média</div></div>
  </div>`;
  const medals=['m1','m2','m3'];
  const n=sorted.length;
  const bottomStart=n-4;
  html+=`<div class="card-wrap"><table class="rank-table"><thead><tr><th style="width:36px">#</th><th>Nome</th>`;
  if(activeRankTab==='all')closedRounds.forEach(r=>{html+=`<th style="width:60px;text-align:right;font-size:9px">${r.name}</th>`;});
  html+=`<th style="width:50px;text-align:right">Pts</th></tr></thead><tbody>`;
  sorted.forEach((s,i)=>{
    const pos=i<3?`<span class="medal ${medals[i]}">${i+1}</span>`:`<span style="color:${i>=bottomStart?'#f44336':'#555'};font-weight:600">${i+1}</span>`;
    const nameColor=i===0?'#FFD700':i===1?'#aaa':i===2?'#cd7f32':i>=bottomStart?'#f44336':'#ccc';
    const rowStyle=i>=bottomStart?'background:#1a0000;':'';
    html+=`<tr style="${rowStyle}"><td>${pos}</td><td style="font-weight:${i<3||i>=bottomStart?'700':'500'};color:${nameColor}">${s.name}${i>=bottomStart?' 📉':''}</td>`;
    if(activeRankTab==='all')closedRounds.forEach(r=>{html+=`<td style="text-align:right;color:#666">${scores[s.name].byRound[r.id]||0}</td>`;});
    html+=`<td style="text-align:right"><span class="pts" style="${i>=bottomStart?'border-color:#f44336;color:#f44336;background:#3b0d0d':''}">${s.pts}</span></td></tr>`;
  });
  html+=`</tbody></table></div>`;
  c.innerHTML=html;
}
function selRankTab(rid){activeRankTab=rid;renderRank();}

// ── Recordes ──────────────────────────────────────────────────────────────────
function renderRecordes(){
  const c=document.getElementById('tab-recordes');
  if(!loaded){c.innerHTML='<div class="empty">Carregando...</div>';return;}
  const closedRounds=ROUNDS.filter(r=>state.closed[r.id]);
  const scores=computeScores();
  const tabBtns=[`<button class="rtab${activeRecTab==='all'?' active':''}" onclick="selRecTab('all')">Geral</button>`]
    .concat(closedRounds.map(r=>`<button class="rtab${activeRecTab===r.id?' active':''}" onclick="selRecTab('${r.id}')">${r.name}</button>`))
    .join('');
  let html=`<div class="round-tab-row">${tabBtns}</div>`;
  if(!closedRounds.length){html+=`<div class="empty">⭐<br><br>Nenhuma rodada encerrada ainda.</div>`;c.innerHTML=html;return;}

  let recData=[];
  if(activeRecTab==='all'){
    const totalGames=closedRounds.reduce((s,r)=>s+r.games.length,0);
    recData=PARTICIPANTS.map(p=>{const pts=scores[p].total;const pct=totalGames>0?Math.round(pts/totalGames*100):0;return{name:p,pts,total:totalGames,pct};}).sort((a,b)=>b.pct-a.pct||b.pts-a.pts);
  } else {
    const r=ROUNDS.find(x=>x.id===activeRecTab);
    const totalGames=r.games.length;
    recData=PARTICIPANTS.map(p=>{const pts=scores[p].byRound[activeRecTab]||0;const pct=totalGames>0?Math.round(pts/totalGames*100):0;return{name:p,pts,total:totalGames,pct};}).sort((a,b)=>b.pct-a.pct||b.pts-a.pts);
  }

  const best=recData[0],worst=recData[recData.length-1];
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem">
    <div class="rec-card" style="border-color:#8B6914">
      <div class="rec-title">🥇 Melhor</div>
      <div style="font-size:15px;font-weight:700;color:#FFD700">${best.name}</div>
      <div style="font-size:26px;font-weight:700;color:#4caf50;margin:4px 0">${best.pct}%</div>
      <div style="font-size:11px;color:#666">${best.pts} de ${best.total} jogos</div>
    </div>
    <div class="rec-card" style="border-color:#3b0d0d">
      <div class="rec-title">📉 Pior</div>
      <div style="font-size:15px;font-weight:700;color:#f44336">${worst.name}</div>
      <div style="font-size:26px;font-weight:700;color:#f44336;margin:4px 0">${worst.pct}%</div>
      <div style="font-size:11px;color:#666">${worst.pts} de ${worst.total} jogos</div>
    </div>
  </div>`;

  html+=`<div class="rec-card"><div class="rec-title">📊 Aproveitamento por Participante</div>`;
  recData.forEach((d,i)=>{
    const pctClass=d.pct>=60?'high':d.pct>=35?'mid':'low';
    const medals3=['🥇','🥈','🥉'];
    const isBottom=i>=recData.length-4;
    html+=`<div class="rec-row">
      <div style="flex:1">
        <div class="rec-name" style="color:${isBottom?'#f44336':i===0?'#FFD700':'#ccc'}">${i<3?medals3[i]:''} ${d.name}</div>
        <div class="rec-detail">${d.pts} acerto${d.pts!==1?'s':''} de ${d.total} jogo${d.total!==1?'s':''}</div>
        <div class="bar-bg"><div class="bar-fill ${pctClass}" style="width:${d.pct}%"></div></div>
      </div>
      <div style="margin-left:12px;text-align:right">
        <div class="rec-pct ${pctClass}">${d.pct}%</div>
        ${isBottom?'<div style="font-size:10px;color:#f44336">lanterna</div>':''}
      </div>
    </div>`;
  });
  html+=`</div>`;

  if(activeRecTab==='all'&&closedRounds.length>0){
    html+=`<div class="rec-card"><div class="rec-title">🏅 Melhor Rodada de Cada Um</div>`;
    const bestPerP=PARTICIPANTS.map(p=>{
      let best={rid:'',pts:0,total:0,pct:0,rname:''};
      closedRounds.forEach(r=>{const pts=scores[p].byRound[r.id]||0;const pct=Math.round(pts/r.games.length*100);if(pct>best.pct||(pct===best.pct&&pts>best.pts)){best={rid:r.id,pts,total:r.games.length,pct,rname:r.name};}});
      return{name:p,...best};
    }).sort((a,b)=>b.pct-a.pct||b.pts-a.pts);
    bestPerP.forEach(d=>{
      if(!d.rid)return;
      const pctClass=d.pct>=60?'high':d.pct>=35?'mid':'low';
      html+=`<div class="rec-row">
        <div style="flex:1"><div class="rec-name">${d.name}</div><div class="rec-detail">${d.rname} — ${d.pts} de ${d.total} jogos</div></div>
        <div style="margin-left:12px"><span class="rec-pct ${pctClass}" style="font-size:16px">${d.pct}%</span></div>
      </div>`;
    });
    html+=`</div>`;
  }
  c.innerHTML=html;
}
function selRecTab(rid){activeRecTab=rid;renderRecordes();}

loadState();
</script>
</body>
</html>
